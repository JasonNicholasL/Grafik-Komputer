<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Demo Kamera Virtual Interaktif</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/controls/OrbitControls.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/loaders/OBJLoader.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { margin: 0; overflow: hidden; font-family: sans-serif; background-color: #1a1a1a; }
        canvas { display: block; }
        .ui-panel {
            position: absolute;
            top: 20px;
            right: 20px;
            width: 320px;
            background: rgba(255, 255, 255, 0.9);
            padding: 20px;
            border-radius: 12px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.3);
            max-height: 90vh;
            overflow-y: auto;
            backdrop-filter: blur(10px);
            z-index: 10;
        }
        .control-group { margin-bottom: 15px; border-bottom: 1px solid #ddd; padding-bottom: 10px; }
        .control-group:last-child { border-bottom: none; }
        label { display: block; font-size: 0.75rem; font-weight: bold; color: #444; margin-bottom: 4px; text-transform: uppercase; }
        .input-row { display: flex; gap: 8px; margin-bottom: 8px; }
        input[type="number"] {
            width: 100%;
            padding: 4px 8px;
            border: 1px solid #ccc;
            border-radius: 4px;
            font-size: 0.85rem;
        }
        input[type="range"] { width: 100%; cursor: pointer; }
        .info-badge {
            position: absolute;
            bottom: 20px;
            left: 20px;
            background: rgba(0,0,0,0.7);
            color: white;
            padding: 15px;
            border-radius: 8px;
            font-size: 0.8rem;
            pointer-events: none;
            line-height: 1.6;
        }
        .highlight { color: #3498db; font-weight: bold; }
    </style>
</head>
<body>

    <div class="ui-panel" id="ui-panel">
        <h2 class="text-lg font-bold mb-4 text-gray-800 border-b pb-2">Kontrol Kamera</h2>
        
        <!-- Load OBJ -->
        <div class="control-group">
            <label>Masukkan File .OBJ</label>
            <input type="file" id="objLoader" accept=".obj" class="text-xs mb-2 w-full">
            <p class="text-[10px] text-gray-500 italic">*Mengganti kubus default</p>
        </div>

        <!-- Position -->
        <div class="control-group">
            <label>Posisi Kamera (X, Y, Z)</label>
            <div class="input-row">
                <input type="number" id="posX" step="0.1">
                <input type="number" id="posY" step="0.1">
                <input type="number" id="posZ" step="0.1">
            </div>
        </div>

        <!-- Look At -->
        <div class="control-group">
            <label>Look At / Target (X, Y, Z)</label>
            <div class="input-row">
                <input type="number" id="tarX" step="0.1">
                <input type="number" id="tarY" step="0.1">
                <input type="number" id="tarZ" step="0.1">
            </div>
        </div>

        <!-- Up Vector -->
        <div class="control-group">
            <label>Up Vector / Orientasi (X, Y, Z)</label>
            <div class="input-row">
                <input type="number" id="upX" step="0.1">
                <input type="number" id="upY" step="0.1">
                <input type="number" id="upZ" step="0.1">
            </div>
        </div>

        <!-- Zoom / FOV -->
        <div class="control-group">
            <label id="fovLabel">Field of View (Zoom): 50°</label>
            <input type="range" id="fov" min="10" max="120" value="50">
        </div>

        <div class="mt-4">
            <button id="resetCam" class="w-full bg-blue-600 hover:bg-blue-700 text-white font-bold py-2 px-4 rounded transition">
                Reset Kamera
            </button>
        </div>
    </div>

    <div class="info-badge">
        <span class="highlight">WASD</span>: Gerak Kamera & Strafe<br>
        <span class="highlight">Q / E</span>: Putar Orientasi Up Vector<br>
        <span class="highlight">Mouse Kiri</span>: Putar Pandangan (Look At)<br>
        <span class="highlight">Mouse Kanan</span>: Geser Posisi (Pan)<br>
        <span class="highlight">Scroll</span>: Zoom In/Out
    </div>

    <script>
        let scene, camera, renderer, controls, activeObject;
        let keys = {};
        const moveSpeed = 0.1;
        
        // Element UI
        const inputs = {
            posX: document.getElementById('posX'),
            posY: document.getElementById('posY'),
            posZ: document.getElementById('posZ'),
            tarX: document.getElementById('tarX'),
            tarY: document.getElementById('tarY'),
            tarZ: document.getElementById('tarZ'),
            upX: document.getElementById('upX'),
            upY: document.getElementById('upY'),
            upZ: document.getElementById('upZ'),
            fov: document.getElementById('fov'),
            fovLabel: document.getElementById('fovLabel')
        };

        function init() {
            scene = new THREE.Scene();
            scene.background = new THREE.Color(0x111111);

            camera = new THREE.PerspectiveCamera(50, window.innerWidth / window.innerHeight, 0.1, 1000);
            camera.position.set(5, 5, 5);

            renderer = new THREE.WebGLRenderer({ antialias: true });
            renderer.setSize(window.innerWidth, window.innerHeight);
            renderer.setPixelRatio(window.devicePixelRatio);
            document.body.appendChild(renderer.domElement);

            controls = new THREE.OrbitControls(camera, renderer.domElement);
            controls.enableDamping = true;
            controls.dampingFactor = 0.05;

            // Objek Default
            createBox();

            // Helpers
            scene.add(new THREE.GridHelper(20, 20, 0x444444, 0x222222));
            scene.add(new THREE.AxesHelper(5));

            // Lighting
            const keyLight = new THREE.DirectionalLight(0xffffff, 1);
            keyLight.position.set(5, 10, 5);
            scene.add(keyLight);

            const fillLight = new THREE.DirectionalLight(0xffffff, 0.4);
            fillLight.position.set(-5, 5, 5);
            scene.add(fillLight);

            const backLight = new THREE.DirectionalLight(0xffffff, 0.3);
            backLight.position.set(0, 5, -10);
            scene.add(backLight);

            scene.add(new THREE.AmbientLight(0x404040, 0.5));

            setupEventListeners();
            updateUIFromCamera();
            animate();
        }

        function createBox() {
            if (activeObject) scene.remove(activeObject);
            const geometry = new THREE.BoxGeometry(2, 2, 2);
            const material = new THREE.MeshStandardMaterial({ color: 0x3498db, roughness: 0.3 });
            activeObject = new THREE.Mesh(geometry, material);
            scene.add(activeObject);
        }

        function setupEventListeners() {
            // Input Keyboard
            window.addEventListener('keydown', (e) => keys[e.code] = true);
            window.addEventListener('keyup', (e) => keys[e.code] = false);

            // OBJ Loader
            document.getElementById('objLoader').addEventListener('change', function(e) {
                const file = e.target.files[0];
                if (!file) return;

                const reader = new FileReader();
                reader.onload = function(event) {
                    const contents = event.target.result;
                    const loader = new THREE.OBJLoader();
                    const object = loader.parse(contents);
                    
                    if (activeObject) scene.remove(activeObject);
                    
                    object.traverse((child) => {
                        if (child.isMesh) {
                            child.material = new THREE.MeshStandardMaterial({ color: 0xcccccc });
                        }
                    });

                    // Auto-centering and scaling
                    const box = new THREE.Box3().setFromObject(object);
                    const center = box.getCenter(new THREE.Vector3());
                    object.position.sub(center);

                    activeObject = object;
                    scene.add(activeObject);
                };
                reader.readAsText(file);
            });

            // Update UI saat OrbitControls berubah
            controls.addEventListener('change', updateUIFromCamera);

            // Update Camera dari input UI manual
            const updateFromManualInput = () => {
                camera.position.set(
                    parseFloat(inputs.posX.value),
                    parseFloat(inputs.posY.value),
                    parseFloat(inputs.posZ.value)
                );
                controls.target.set(
                    parseFloat(inputs.tarX.value),
                    parseFloat(inputs.tarY.value),
                    parseFloat(inputs.tarZ.value)
                );
                camera.up.set(
                    parseFloat(inputs.upX.value),
                    parseFloat(inputs.upY.value),
                    parseFloat(inputs.upZ.value)
                );
                camera.fov = parseFloat(inputs.fov.value);
                inputs.fovLabel.innerText = `Field of View (Zoom): ${inputs.fov.value}°`;
                camera.updateProjectionMatrix();
                controls.update();
            };

            [inputs.posX, inputs.posY, inputs.posZ, 
             inputs.tarX, inputs.tarY, inputs.tarZ,
             inputs.upX, inputs.upY, inputs.upZ, inputs.fov].forEach(el => {
                el.addEventListener('input', updateFromManualInput);
            });

            document.getElementById('resetCam').addEventListener('click', () => {
                camera.position.set(5, 5, 5);
                controls.target.set(0, 0, 0);
                camera.up.set(0, 1, 0);
                camera.fov = 50;
                updateUIFromCamera();
                camera.updateProjectionMatrix();
                controls.update();
            });

            window.addEventListener('resize', onWindowResize);
        }

        function handleKeyboard() {
            const forward = new THREE.Vector3();
            camera.getWorldDirection(forward);
            
            const right = new THREE.Vector3();
            right.crossVectors(forward, camera.up).normalize();

            let moved = false;

            // WASD Movement & Strafe
            if (keys['KeyW']) { camera.position.addScaledVector(forward, moveSpeed); controls.target.addScaledVector(forward, moveSpeed); moved = true; }
            if (keys['KeyS']) { camera.position.addScaledVector(forward, -moveSpeed); controls.target.addScaledVector(forward, -moveSpeed); moved = true; }
            if (keys['KeyA']) { camera.position.addScaledVector(right, -moveSpeed); controls.target.addScaledVector(right, -moveSpeed); moved = true; }
            if (keys['KeyD']) { camera.position.addScaledVector(right, moveSpeed); controls.target.addScaledVector(right, moveSpeed); moved = true; }

            // Q/E Orientasi (Up Vector)
            // Sederhana: kita geser nilai x/z pada vektor up
            if (keys['KeyQ']) { camera.up.x -= 0.02; moved = true; }
            if (keys['KeyE']) { camera.up.x += 0.02; moved = true; }

            if (moved) {
                camera.up.normalize();
                controls.update();
                updateUIFromCamera();
            }
        }

        function updateUIFromCamera() {
            inputs.posX.value = camera.position.x.toFixed(2);
            inputs.posY.value = camera.position.y.toFixed(2);
            inputs.posZ.value = camera.position.z.toFixed(2);

            inputs.tarX.value = controls.target.x.toFixed(2);
            inputs.tarY.value = controls.target.y.toFixed(2);
            inputs.tarZ.value = controls.target.z.toFixed(2);

            inputs.upX.value = camera.up.x.toFixed(2);
            inputs.upY.value = camera.up.y.toFixed(2);
            inputs.upZ.value = camera.up.z.toFixed(2);

            inputs.fov.value = camera.fov;
            inputs.fovLabel.innerText = `Field of View (Zoom): ${Math.round(camera.fov)}°`;
        }

        function onWindowResize() {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        }

        function animate() {
            requestAnimationFrame(animate);
            handleKeyboard();
            controls.update();
            renderer.render(scene, camera);
        }

        window.onload = init;
    </script>
</body>
</html>
